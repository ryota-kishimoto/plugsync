# .plugsync.yaml — example configuration for Claude Code
# Place as .plugsync.yaml in any directory and run: plugsync

target: ~/.claude

repos:
  - url: https://github.com/anthropics/skills
    skills:
      - skills/skill-creator
      - skills/frontend-design

  - url: https://github.com/obra/superpowers
    ref: main  # optional: pin to a specific branch or tag
    skills:
      - skills/brainstorming
      - src: skills/using-superpowers  # optional: rename with "name"
        name: superpowers
    agents:
      - agents/code-reviewer.md
    commands:
      - commands/brainstorm.md
