# .plugsync.yaml — example configuration for dotfiles
# Place as .plugsync.yaml in your dotfiles directory and run: plugsync
#
# target is relative to this config file's location.
# "." means the same directory as this file.

target: .

repos:
  - url: https://github.com/mathiasbynens/dotfiles
    paths:
      - path: .
        src:
          - .editorconfig

  - url: https://github.com/stevemao/github-issue-templates
    paths:
      - path: .github
        src:
          - PULL_REQUEST_TEMPLATE.md
          - src: PULL_REQUEST_TEMPLATE.md  # optional: rename (subdirs allowed)
            name: pull_request_template/feature.md
